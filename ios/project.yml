name: VidSum
options:
  bundleIdPrefix: com.vidsum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  VidSum:
    type: application
    platform: iOS
    sources:
      - path: VidSum
        excludes:
          - "**/.DS_Store"
          # Avoid XcodeGen treating *.example as a resource bundle file
          - "**/*.example"
    resources:
      - path: VidSum/Resources/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        # New bundle so Xcode installs a fresh app (avoids stale com.vidsum.app on device).
        PRODUCT_BUNDLE_IDENTIFIER: com.vidsum.app.dev
        INFOPLIST_FILE: VidSum/Info.plist
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "0.2.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
