# Monorepo kökünden Railway deploy edildiğinde bu dosya uygulanır (`web/` altındaki nixpacks.toml atlanır).
# yt-dlp + ffmpeg + deno: Deepgram ses indirme; deno bazı YouTube EJS yolları için (yt-dlp wiki/EJS).
# "..." Nixpacks’un varsayılan Node/npm kurulumunu korur.
[phases.setup]
nixPkgs = ["...", "yt-dlp", "ffmpeg", "deno"]
