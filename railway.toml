# Monorepo: Next.js in `web/`. DOCKERFILE avoids Railpack (which fails if Root Directory is wrong).
# Service → Root Directory: leave empty so repo root contains this file + `web/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must match image: start from repo root so `npm run start` → `web` (see root package.json).
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
